# Hermetic end-to-end auth test stack: a real Keycloak issuer, an echo upstream,
# and Kong running the oidc plugin in bearer_only mode. Driven by
# scripts/integration-test.sh. Not meant for humans — see docker-compose.demo.yml
# for the interactive Keycloak demo.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Pin the issuer so tokens minted via the host port (127.0.0.1:8080) carry
      # the same iss that Kong uses to introspect them (keycloak:8080). Without
      # this, the issuer host mismatch makes Keycloak report active=false.
      KC_HOSTNAME: http://keycloak:8080
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "127.0.0.1:8080:8080"

  httpbin:
    image: kennethreitz/httpbin

  kong:
    build:
      context: ../..
    depends_on:
      - keycloak
      - httpbin
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PLUGINS: "bundled,oidc"
    volumes:
      - ./kong.yml:/opt/kong/kong.yml:ro
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
