_format_version: "3.0"

# ---------------------------------------------------------------------------
# Example DB-less configuration.
#
# Everything below is commented out so `docker compose up` starts with a clean,
# empty Kong. Replace the placeholders with your own issuer and client values,
# generate a 32-byte session secret with `openssl rand -base64 32`, then remove
# the leading `#` to enable the service.
#
# services:
#   - name: echo
#     url: https://httpbin.org/anything
#     routes:
#       - name: echo
#         paths: ["/echo"]
#         strip_path: true
#     plugins:
#       - name: oidc
#         config:
#           client_id: your-client-id
#           client_secret: your-client-secret
#           discovery: https://your-issuer/.well-known/openid-configuration
#           redirect_uri: /callback
#           session_secret: REPLACE_WITH_opsl_rand_base64_32
